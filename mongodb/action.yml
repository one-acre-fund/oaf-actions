name: Helm MongoDB
description: GitHub Action for deploying production-grade MongoDB with Helm
author: orchide
branding:
  icon: database
  color: green
inputs:
  NAMESPACE:
    description: "The namespace to deploy the MongoDB server to."
    required: true
  RELEASE_NAME:
    description: "The name of the release for the MongoDB server."
    default: "mongodb"
    required: true
  INSTALL_MONGODB:
    description: "Whether to install MongoDB or not."
    default: "false"
    required: true
  IMAGE_PULL_SECRET_NAME:
    description: "The name of the image pull secret to use for pulling the MongoDB image."
    default: "dockerhub-secret"
    required: false

  # Architecture
  MONGODB_ARCHITECTURE:
    description: "MongoDB architecture: standalone or replicaset."
    default: "standalone"
    required: false

  # Image settings
  MONGODB_IMAGE_REPOSITORY:
    description: "The image repository for the MongoDB server."
    default: "bitnami/mongodb"
    required: false
  MONGODB_IMAGE_TAG:
    description: "The image tag for the MongoDB server."
    default: "8.0"
    required: false
  MONGODB_IMAGE_DIGEST:
    description: "Optional: The image digest for the MongoDB server (sha256:...). If set, this takes precedence over tag."
    required: false

  # Authentication
  MONGODB_ROOT_PASSWORD:
    description: "The root password for the MongoDB server."
    required: true
  MONGODB_ROOT_USER:
    description: "The root username for the MongoDB server."
    default: "root"
    required: false

  # Custom User (optional)
  MONGODB_USERNAME:
    description: "Optional custom username for MongoDB. If set, also set MONGODB_PASSWORD and MONGODB_DATABASE."
    required: false
  MONGODB_PASSWORD:
    description: "Password for the custom MongoDB user."
    required: false
  MONGODB_DATABASE:
    description: "Database name for the custom MongoDB user."
    required: false

  # ReplicaSet Configuration
  MONGODB_REPLICA_SET_NAME:
    description: "The name of the replica set (only used when architecture is replicaset)."
    default: "rs0"
    required: false
  MONGODB_REPLICA_COUNT:
    description: "Number of MongoDB replicas (only used when architecture is replicaset)."
    default: "3"
    required: false
  MONGODB_REPLICA_SET_KEY:
    description: "The replica set key for authentication (only used when architecture is replicaset). Auto-generated if not provided."
    required: false

  # Storage
  MONGODB_STORAGE_CLASS:
    description: "The storage class for MongoDB persistent storage."
    required: false
  MONGODB_STORAGE_SIZE:
    description: "The storage size for MongoDB persistent storage."
    default: "8Gi"
    required: false

  # Resources
  MONGODB_CPU_LIMIT:
    description: "The CPU limit for MongoDB nodes."
    default: "1"
    required: false
  MONGODB_MEMORY_LIMIT:
    description: "The memory limit for MongoDB nodes."
    default: "2Gi"
    required: false
  MONGODB_CPU_REQUEST:
    description: "The CPU request for MongoDB nodes."
    default: "500m"
    required: false
  MONGODB_MEMORY_REQUEST:
    description: "The memory request for MongoDB nodes."
    default: "1Gi"
    required: false

  # Extended configuration
  EXTENDED_CONFIGURATION:
    description: "Additional MongoDB configuration parameters."
    required: false

runs:
  using: composite
  steps:
    - name: Create mongodb-values.yaml
      run: |
        cat <<EOF > ${{ github.workspace }}/mongodb-values.yaml
        global:
          imagePullSecrets:
            - ${{ inputs.IMAGE_PULL_SECRET_NAME }}
          storageClass: "${{ inputs.MONGODB_STORAGE_CLASS }}"

        architecture: ${{ inputs.MONGODB_ARCHITECTURE }}

        image:
          repository: ${{ inputs.MONGODB_IMAGE_REPOSITORY }}
          ${{ inputs.MONGODB_IMAGE_DIGEST != '' && format('digest: {0}', inputs.MONGODB_IMAGE_DIGEST) || format('tag: {0}', inputs.MONGODB_IMAGE_TAG) }}

        auth:
          enabled: true
          rootUser: ${{ inputs.MONGODB_ROOT_USER }}
          rootPassword: "${{ inputs.MONGODB_ROOT_PASSWORD }}"
          ${{ inputs.MONGODB_USERNAME != '' && format('usernames: ["{0}"]', inputs.MONGODB_USERNAME) || '' }}
          ${{ inputs.MONGODB_PASSWORD != '' && format('passwords: ["{0}"]', inputs.MONGODB_PASSWORD) || '' }}
          ${{ inputs.MONGODB_DATABASE != '' && format('databases: ["{0}"]', inputs.MONGODB_DATABASE) || '' }}
          ${{ inputs.MONGODB_REPLICA_SET_KEY != '' && format('replicaSetKey: "{0}"', inputs.MONGODB_REPLICA_SET_KEY) || '' }}

        replicaSetName: ${{ inputs.MONGODB_REPLICA_SET_NAME }}
        replicaCount: ${{ inputs.MONGODB_REPLICA_COUNT }}

        persistence:
          enabled: true
          size: ${{ inputs.MONGODB_STORAGE_SIZE }}

        resources:
          limits:
            cpu: ${{ inputs.MONGODB_CPU_LIMIT }}
            memory: ${{ inputs.MONGODB_MEMORY_LIMIT }}
          requests:
            cpu: ${{ inputs.MONGODB_CPU_REQUEST }}
            memory: ${{ inputs.MONGODB_MEMORY_REQUEST }}

        ${{ inputs.EXTENDED_CONFIGURATION }}
        EOF
      shell: bash

    - name: Check mongodb-values.yaml
      run: cat ${{ github.workspace }}/mongodb-values.yaml
      shell: bash

    - name: Deploy MongoDB
      run: |-
        if [ "${{ inputs.INSTALL_MONGODB }}" == "false" ]; then
          echo "MongoDB installation is disabled. Skipping deployment."
        else
          echo "MongoDB installation is enabled. Proceeding with deployment."
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm upgrade --install -n ${{ inputs.NAMESPACE }} \
            --values ${{ github.workspace }}/mongodb-values.yaml \
            --debug \
            --wait \
            --timeout 5m \
            ${{ inputs.RELEASE_NAME }} bitnami/mongodb
        fi
      shell: bash

    - name: MongoDB Connection Info
      if: ${{ inputs.INSTALL_MONGODB == 'true' }}
      run: |
        echo "## MongoDB Connection Information" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release Name:** \`${{ inputs.RELEASE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Namespace:** \`${{ inputs.NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Architecture:** \`${{ inputs.MONGODB_ARCHITECTURE }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Credentials" >> $GITHUB_STEP_SUMMARY
        echo "- **Root Username:** \`${{ inputs.MONGODB_ROOT_USER }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Root Password:** \`<value from MONGODB_ROOT_PASSWORD input>\`" >> $GITHUB_STEP_SUMMARY

        if [ -n "${{ inputs.MONGODB_USERNAME }}" ]; then
          echo "- **Custom Username:** \`${{ inputs.MONGODB_USERNAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Password:** \`<value from MONGODB_PASSWORD input>\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom Database:** \`${{ inputs.MONGODB_DATABASE }}\`" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Connection Commands" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Get MongoDB Service" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "kubectl get svc -n ${{ inputs.NAMESPACE }} | grep ${{ inputs.RELEASE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Connect from within cluster" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "kubectl run -it --rm mongodb-client --image=bitnami/mongodb:8.0 --restart=Never -n ${{ inputs.NAMESPACE }} -- \\" >> $GITHUB_STEP_SUMMARY
        echo "  mongosh mongodb://${{ inputs.MONGODB_ROOT_USER }}:<PASSWORD>@${{ inputs.RELEASE_NAME }}:27017" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Port-forward for local access" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "kubectl port-forward svc/${{ inputs.RELEASE_NAME }} -n ${{ inputs.NAMESPACE }} 27017:27017" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Then connect locally:" >> $GITHUB_STEP_SUMMARY
        echo "mongosh mongodb://${{ inputs.MONGODB_ROOT_USER }}:<PASSWORD>@localhost:27017" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Connection String Format" >> $GITHUB_STEP_SUMMARY

        if [ "${{ inputs.MONGODB_ARCHITECTURE }}" == "replicaset" ]; then
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "mongodb://${{ inputs.MONGODB_ROOT_USER }}:<PASSWORD>@${{ inputs.RELEASE_NAME }}-0.${{ inputs.RELEASE_NAME }}-headless:27017,${{ inputs.RELEASE_NAME }}-1.${{ inputs.RELEASE_NAME }}-headless:27017,${{ inputs.RELEASE_NAME }}-2.${{ inputs.RELEASE_NAME }}-headless:27017/?replicaSet=${{ inputs.MONGODB_REPLICA_SET_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "mongodb://${{ inputs.MONGODB_ROOT_USER }}:<PASSWORD>@${{ inputs.RELEASE_NAME }}:27017" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash
